<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>摘抄本</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";margin:0;background:#f7f7f7}
header{padding:16px;font-size:20px;font-weight:700;background:#fff;border-bottom:1px solid #ddd}
.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:#222;color:#fff;font-size:26px;border:none}
.list{padding:12px}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card .t{font-weight:600;margin-bottom:4px}
.card .m{font-size:13px;color:#666}
button{cursor:pointer}
</style>
</head>
<body>

<header>摘抄本</header>

<div class="list" id="list"></div>

<button class="fab" id="addBtn">＋</button>

<script>
const DB_NAME = 'zzb';
const STORE = 'items';

function openDB(){
  return new Promise((ok,err)=>{
    const r = indexedDB.open(DB_NAME,1);
    r.onupgradeneeded = e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
    r.onsuccess = e=>ok(e.target.result);
    r.onerror = ()=>err(r.error);
  });
}

async function load(){
  const db = await openDB();
  const tx = db.transaction(STORE,'readonly');
  const req = tx.objectStore(STORE).getAll();
  req.onsuccess = ()=>{
    const list = document.getElementById('list');
    list.innerHTML = '';
    (req.result||[]).forEach(i=>{
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<div class="t">${i.title||'（无标题）'}</div><div class="m">${i.type||''}</div>`;
      list.appendChild(div);
    });
  };
}

document.getElementById('addBtn').onclick = async ()=>{
  const title = prompt('写个标题：');
  if(!title) return;
  const db = await openDB();
  const tx = db.transaction(STORE,'readwrite');
  tx.objectStore(STORE).put({
    id: Date.now().toString(),
    title,
    type: '句子',
    createdAt: Date.now()
  });
  tx.oncomplete = load;
};

load();
</script>

</body>
</html>
