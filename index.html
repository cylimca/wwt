<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>摘抄本</title>

<link rel="manifest" href='data:application/manifest+json,{"name":"摘抄本","short_name":"摘抄本","start_url":".","display":"standalone","background_color":"#f8f6f3","theme_color":"#2e2a26"}'/>

<style>
:root{
  --bg:#f8f6f3;--paper:#fff;--ink:#2e2a26;--ink2:#6b6560;
  --line:#e6e2de;--accent:#5c6b5e;--radius:14px;
  --serif:'Georgia','Noto Serif SC','Songti SC',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);height:100vh;overflow:hidden;color:var(--ink)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px;outline:none}

.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto}
header{padding:16px 16px 10px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
header h1{font-family:var(--serif);font-size:20px;font-weight:700}
.tabs{display:flex;gap:6px;margin-top:10px;overflow-x:auto}
.tab{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ink2);border:1px solid transparent;white-space:nowrap}
.tab.active{background:var(--ink);color:#fff}

.main{flex:1;overflow-y:auto;padding:12px 14px 100px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card .title{font-family:var(--serif);font-size:17px;font-weight:700}
.card .meta{font-size:12.5px;color:var(--ink2);margin-top:6px}
.tag{display:inline-block;font-size:11px;background:#eee;color:var(--ink2);border-radius:999px;padding:2px 8px;margin:2px}

.point{border-left:4px solid var(--line);margin-left:8px;padding-left:12px}
.point.agree{border-color:#4caf50}
.point.disagree{border-color:#d9534f}

.fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--ink);color:#fff;font-size:26px;box-shadow:0 6px 20px rgba(0,0,0,.25)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;max-width:520px;margin:0 auto;background:#fff;border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom)+24px);max-height:90vh;overflow-y:auto}
.sheet h2{font-family:var(--serif);margin-bottom:12px}
.field{margin-bottom:10px}
.field label{font-size:12.5px;color:var(--ink2);display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg)}
.field textarea{min-height:100px;resize:vertical}
.btn{width:100%;padding:12px;border-radius:12px;background:var(--ink);color:#fff;font-weight:700;margin-top:12px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;height:56px;display:flex;justify-content:space-around;align-items:center;background:#fff;border-top:1px solid var(--line);z-index:30}
.nav button{font-size:13px;font-weight:600;opacity:.55}
.nav button.active{opacity:1}
</style>
</head>

<body>
<div class="app">

<header>
  <h1>摘抄本</h1>
  <div class="tabs" id="tabs"></div>
</header>

<div class="main" id="view"></div>

<button class="fab" id="fab">＋</button>

<div class="overlay" id="sheet">
  <div class="sheet">
    <h2 id="formTitle">新记录</h2>
    <div id="fields"></div>
    <button class="btn" id="saveBtn">保存</button>
    <button class="btn" style="background:#ddd;color:#333" id="cancelBtn">取消</button>
  </div>
</div>

<div class="nav">
  <button data-page="list" class="active">📖 摘录</button>
  <button data-page="random">🎲 随机</button>
  <button data-page="backup">⚙️ 备份</button>
</div>

</div>

<script>
const DB = (()=>{
  const S='items';
  function o(){return new Promise((ok,err)=>{const r=indexedDB.open('zzb',1);r.onupgradeneeded=e=>e.target.result.createObjectStore(S,{keyPath:'id'});r.onsuccess=e=>ok(e.target.result);r.onerror=()=>err(r.error)})}
  return{
    all:async()=>{const d=await o(),t=d.transaction(S,'readonly'),r=t.objectStore(S).getAll();return new Promise(k=>r.onsuccess=()=>k(r.result||[]))},
    put:async i=>{const d=await o(),t=d.transaction(S,'readwrite');t.objectStore(S).put(i)},
    del:async id=>{const d=await o(),t=d.transaction(S,'readwrite');t.objectStore(S).delete(id)}
  }
})();

const TYPES=[
  {k:'sentence',n:'句子'},{k:'word',n:'词语'},{k:'essay',n:'随笔'},
  {k:'article',n:'文章'},{k:'issue',n:'议题'},{k:'point',n:'观点'}
];

let state={tab:'all',page:'list',edit:null};

function $(id){return document.getElementById(id)}

function renderTabs(){
  $('tabs').innerHTML=TYPES.map(t=>`<button class="tab ${state.tab===t.k?'active':''}" data-t="${t.k}">${t.n}</button>`).join('')+
    `<button class="tab ${state.tab==='all'?'active':''}" data-t="all">全部</button>`;
  $('tabs').onclick=e=>{if(e.target.dataset.t){state.tab=e.target.dataset.t;render()}}
}

async function render(){
  renderTabs();
  const list=await DB.all();
  let items=list.filter(i=>state.tab==='all'||i.type===state.tab);
  items.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  if(state.page==='random'){
    const p=items[Math.floor(Math.random()*items.length)]||{};
    $('view').innerHTML=`<div class="card"><div class="title">🎲 随机</div><div class="meta">${p.content||p.title||''}</div></div>`;
    return
  }

  if(state.page==='backup'){
    $('view').innerHTML=`<div class="card"><div class="title">备份</div>
    <button class="btn" onclick="exportB()">导出 JSON</button>
    <input type="file" onchange="importB(event)" style="margin-top:10px"></div>`;
    return
  }

  $('view').innerHTML=items.length?items.map(item=>`
    <div class="card ${item.type==='point'?'point '+item.stance:''}">
      <div class="title">${item.title||item.content||'(无内容)'}</div>
      <div class="meta">${item.type} · ${item.author||''} · ${item.source||''}</div>
    </div>
  `).join(''):'<p style="padding:30px;text-align:center;color:#999">暂无记录</p>';
}

$('fab').onclick=()=>{$('sheet').classList.add('open');buildForm()};
$('cancelBtn').onclick=()=>$('sheet').classList.remove('open');

function buildForm(){
  $('fields').innerHTML=`
    <div class="field"><label>类型</label><select id="type">
      ${TYPES.map(t=>`<option value="${t.k}">${t.n}</option>`).join('')}
    </select></div>
    <div class="field"><label>标题 / 内容</label><textarea id="content"></textarea></div>
    <div class="field"><label>作者</label><input id="author"></div>
    <div class="field"><label>来源</label><input id="source"></div>
  `;
}

$('saveBtn').onclick=async()=>{
  const obj={
    id:Date.now().toString(),
    type:$('type').value,
    content:$('content').value,
    author:$('author').value,
    source:$('source').value,
    createdAt:Date.now()
  };
  await DB.put(obj);
  $('sheet').classList.remove('open');
  render();
};

window.exportB=async()=>{const d=await DB.all();const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='zzb.json';a.click()};
window.importB=async e=>{const f=e.target.files[0];const t=await f.text();JSON.parse(t).forEach(async i=>await DB.put(i));render()};

document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;render();document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')});

render();
</script>
</body>
</html>
