<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>摘抄本</title>

<link rel="manifest" href='data:application/manifest+json,{"name":"摘抄本","short_name":"摘抄本","start_url":".","display":"standalone","background_color":"#f8f6f3","theme_color":"#2e2a26"}' />

<style>
:root {
  --bg:#f8f6f3;--paper:#ffffff;--ink:#2e2a26;--ink2:#6b6560;
  --line:#e8e4df;--accent:#5c6b5e;--accent2:#e9ece9;
  --radius:14px;--serif:'Georgia','Noto Serif SC','Songti SC',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:var(--sans);font-size:15px;outline:none}

.app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;background:var(--bg)}
header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);padding:14px 16px 10px}
header h1{font-family:var(--serif);font-weight:700;font-size:20px}
.tabs{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:4px}
.tab{padding:6px 12px 8px;border-radius:999px;font-size:13px;font-weight:600;color:var(--ink2);border:1px solid transparent;white-space:nowrap}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 96px}

/* Cards */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.card .title{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:4px}
.card .subtitle{font-size:12.5px;color:var(--ink2);margin-bottom:8px}
.card .content{font-size:15px;line-height:1.75;white-space:pre-wrap}
.card .meta{margin-top:8px;font-size:12.5px;color:var(--ink2)}
.card .tag{display:inline-block;font-size:11.5px;background:var(--accent2);color:var(--accent);border-radius:999px;padding:2px 8px;margin:3px 4px 3px 0}
.card .actions{margin-top:10px;display:flex;gap:12px}
.card .actions button{font-size:12px;color:var(--ink2)}

/* Issue specific */
.issue-card .count{font-size:12px;color:var(--accent);font-weight:600;margin-top:6px}
.point-card{border-left:4px solid var(--line);padding-left:12px;margin-left:8px}
.point-card.stance-agree{border-left-color:#4caf50;}
.point-card.stance-disagree{border-left-color:#d9534f;}
.point-card.stance-neutral{border-left-color:#888;}

/* Word specific */
.word-head{font-family:var(--serif);font-size:18px;font-weight:700}
.toggle-meaning{font-size:12.5px;color:var(--accent);margin-top:6px}
.meaning-box{margin-top:8px;font-size:14px;line-height:1.7;color:var(--ink2);white-space:pre-wrap;display:none}
.meaning-box.on{display:block}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;z-index:20;width:56px;height:56px;border-radius:50%;background:var(--ink);color:#fff;font-size:26px;line-height:56px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.2)}

/* Overlay & Sheet */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(40,36,32,.45);align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;max-width:520px;margin:0 auto;background:var(--paper);border-radius:18px 18px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom)+24px);max-height:90vh;overflow-y:auto}
.sheet h2{font-family:var(--serif);font-size:18px;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12.5px;color:var(--ink2);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--bg)}
.field textarea{min-height:100px;resize:vertical}
.btn-primary{margin-top:14px;width:100%;padding:12px;border-radius:12px;background:var(--ink);color:#fff;font-weight:700;font-size:15px}
.btn-cancel{width:100%;padding:10px;font-size:13px;color:var(--ink2);margin-top:6px}

/* Nav */
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;height:56px;display:flex;justify-content:space-around;align-items:center;background:var(--paper);border-top:1px solid var(--line);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{font-size:13px;font-weight:600;opacity:.55;background:none;border:none;color:inherit}
.nav-btn.active{opacity:1}

/* Empty state */
.empty{padding:48px 12px;text-align:center;color:var(--ink2);font-size:14px}
.empty .big{font-size:36px;margin-bottom:8px}
</style>
</head>

<body>

  <header>
    <h1>摘抄本</h1>
    <div class="tabs" id="tabs"></div>
  </header>

  <div class="main" id="listView"></div>
  <div class="main" id="detailView" style="display:none"></div>
  <div class="main" id="randomView" style="display:none"></div>
  <div class="main" id="moreView" style="display:none"></div>

  <button class="fab" id="fabAdd">＋</button>

  <!-- Form Sheet -->
  <div class="overlay" id="sheet">
    <div class="sheet">
      <h2 id="formTitle">新记录</h2>
      <div class="field"><label>类型</label><select id="fType"></select></div>
      <div id="formFields"></div>
      <button class="btn-primary" id="btnSave">保存</button>
      <button class="btn-cancel" id="btnCancel">取消</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="nav-bar">
    <button class="nav-btn active" data-view="list">📖 摘录</button>
